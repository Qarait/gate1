name: Preflight (Release Audit)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Preflight Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run doc tests
        run: cargo test --doc

      - name: Build docs (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

      - name: Inventory package contents
        run: cargo package --list | tee "$RUNNER_TEMP/package_list.txt"

      - name: Run publish dry-run
        run: cargo publish --dry-run | tee "$RUNNER_TEMP/publish_dry_run.txt"

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-audit-proofs
          path: |
            ${{ runner.temp }}/package_list.txt
            ${{ runner.temp }}/publish_dry_run.txt
